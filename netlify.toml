[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
  
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

    [[redirects]]
  from = "/robots.txt"
  to = "/robots.txt
  status = 200